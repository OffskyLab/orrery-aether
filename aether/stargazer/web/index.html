<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Stargazer · Aether</title>
<style>
  :root{
    --bg:#05060d; --bg2:#0b0e1c; --ink:#e6e9f5; --dim:#7b85a8; --line:#1c2238;
    --star:#cfe0ff; --comet:#7fd1ff; --done:#86f0c0; --kill:#ff7a8a; --warn:#ffd166;
    --accent:#8a7dff;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1200px 700px at 70% -10%,#10152e 0%,var(--bg) 60%);
    color:var(--ink);font:14px/1.45 ui-monospace,SFMono-Regular,Menlo,monospace}
  header{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--line)}
  header h1{font-size:15px;margin:0;letter-spacing:.14em;font-weight:600}
  header .sub{color:var(--dim);font-size:12px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--kill);box-shadow:0 0 8px var(--kill)}
  .dot.on{background:var(--done);box-shadow:0 0 8px var(--done)}
  .grid{display:grid;grid-template-columns:1.3fr 1fr;grid-template-rows:auto auto;gap:1px;
    background:var(--line);height:calc(100vh - 50px)}
  .panel{background:var(--bg2);padding:12px 14px;overflow:auto}
  .panel h2{font-size:11px;letter-spacing:.18em;color:var(--dim);margin:0 0 10px;text-transform:uppercase}
  #map{grid-row:span 2}
  svg{width:100%;height:100%;display:block}
  .starlabel{fill:var(--dim);font-size:11px}
  .hop{padding:6px 8px;border-left:2px solid var(--comet);margin:0 0 6px;background:#0a0f22;border-radius:0 6px 6px 0}
  .hop .rt{color:var(--dim)}
  .hop .arrow{color:var(--comet)}
  .hop .sum{color:var(--done);font-size:12px}
  .conv{margin-bottom:14px}
  .conv .cid{color:var(--accent);font-size:11px;letter-spacing:.08em;margin-bottom:4px}
  .term{color:var(--kill);font-size:12px;margin-top:2px}
  .ext{display:flex;gap:8px;padding:5px 8px;border-bottom:1px solid var(--line)}
  .badge{padding:1px 7px;border-radius:10px;font-size:11px;border:1px solid currentColor}
  .r-horizon{color:var(--warn)} .r-rate{color:#ff9f5a} .r-dedup{color:#9aa6ff}
  .r-malformed_output{color:#ff7ad0} .r-recipient_offline{color:var(--dim)} .r-invalid_recipient{color:var(--kill)}
  .r-ack_suppressed{color:#6fb0a0} .r-operator_kill{color:#ff5d5d} .r-wave_reply_forbidden{color:#ffb000}
  .op{padding:5px 8px;border-left:2px solid var(--accent);margin:0 0 6px;background:#120e26;border-radius:0 6px 6px 0}
  .op b{color:var(--accent)}
  .mile{padding:3px 8px;color:var(--dim)} .mile b{color:var(--comet)}
  .mile.done b{color:var(--done)}
  select{background:#0a0f22;color:var(--ink);border:1px solid var(--line);border-radius:6px;padding:3px 6px}
  .empty{color:var(--dim);font-style:italic}
</style>
</head>
<body>
<header>
  <span class="dot" id="conn"></span>
  <h1>STARGAZER</h1>
  <span class="sub">aether:events · read-only observatory</span>
  <span class="sub" id="count" style="margin-left:auto"></span>
</header>

<div class="grid">
  <section class="panel" id="map"><h2>Constellation</h2><svg id="sky" viewBox="0 0 600 600"></svg></section>
  <section class="panel"><h2>Conversation Timeline</h2><div id="timeline"><div class="empty">waiting for events…</div></div></section>
  <section class="panel"><h2>Live Telescope
    <select id="convsel"></select></h2><div id="telescope"><div class="empty">select a conversation</div></div></section>
  <section class="panel" style="grid-column:span 2"><h2>Terminated Log (熄滅紀錄)</h2><div id="extinction"><div class="empty">none yet</div></div></section>
</div>

<script>
const events = [];
const CANON = {rate_limited:"rate"};
const canon = r => CANON[r] || r;

const es = new EventSource("/stream");
const conn = document.getElementById("conn");
es.onopen = () => conn.classList.add("on");
es.onerror = () => conn.classList.remove("on");
for (const t of ["message","done","terminated","progress","operator_action"]) {
  es.addEventListener(t, e => { try{ events.push(JSON.parse(e.data)); render(); }catch{} });
}
es.onmessage = e => { try{ events.push(JSON.parse(e.data)); render(); }catch{} };

// Star set is authoritative from /api/constellation (all registry Bodies +
// heartbeat online state + activity), polled so offline stars dim live. The
// event stream drives comet animation.
let constellation = {};
async function pollConstellation(){
  try{ const r = await fetch("/api/constellation"); if(r.ok){ constellation = await r.json(); render(); } }catch{}
}
setInterval(pollConstellation, 2000); pollConstellation();

function starSet(){
  if(Object.keys(constellation).length) return constellation;
  // fallback before the first poll: derive from events (everything assumed online)
  const act={};
  for(const ev of events){const en=ev.envelope||{};
    for(const w of [ev.from,ev.to,ev.project_id,en.from,en.to]) if(w&&w!=="broadcast") act[w]=(act[w]||0)+1;}
  const out={}; for(const k in act) out[k]={activity:act[k], online:true}; return out;
}

function renderSky(){
  const stars=starSet(); const ids=Object.keys(stars).sort(); const svg=document.getElementById("sky");
  const cx=300,cy=300,R=190; let h="";
  const pos={}; ids.forEach((id,i)=>{const a=-Math.PI/2+i*2*Math.PI/Math.max(ids.length,1);
    pos[id]=[cx+R*Math.cos(a), cy+R*Math.sin(a)];});
  // recent comets as faint tracks between stars
  events.slice(-12).forEach(ev=>{const en=ev.envelope; if(ev.event_type==="message"&&en&&pos[en.from]&&pos[en.to]){
    const[a,b]=[pos[en.from],pos[en.to]]; h+=`<line x1="${a[0]}" y1="${a[1]}" x2="${b[0]}" y2="${b[1]}" stroke="#7fd1ff22" stroke-width="1"/>`;}});
  ids.forEach(id=>{const[x,y]=pos[id]; const s=stars[id]; const mag=Math.min(s.activity||0,40);
    const rr=5+Math.sqrt(mag)*2.2; const baseOp=0.35+Math.min(mag/40,1)*0.65;
    const op = s.online ? baseOp : 0.12;                 // offline → very dim
    const fill = s.online ? "var(--star)" : "var(--dim)";
    h+=`<circle cx="${x}" cy="${y}" r="${rr}" fill="${fill}" opacity="${op}"/>`;
    if(s.online) h+=`<circle cx="${x}" cy="${y}" r="${rr+5}" fill="none" stroke="var(--star)" opacity="${baseOp*0.25}"/>`;
    h+=`<text class="starlabel" x="${x}" y="${y+rr+14}" text-anchor="middle" opacity="${s.online?1:0.45}">${id}${s.online?'':' · offline'}</text>`;});
  svg.innerHTML=h || `<text class="starlabel" x="300" y="300" text-anchor="middle">no stars yet</text>`;
}

function renderTimeline(){
  const convs={};
  for(const ev of events){ const cid=ev.conversation_id||"?"; (convs[cid]=convs[cid]||[]).push(ev); }
  const el=document.getElementById("timeline"); let h="";
  const sel=document.getElementById("convsel"); const cur=sel.value;
  sel.innerHTML=Object.keys(convs).map(c=>`<option ${c===cur?"selected":""}>${c}</option>`).join("");
  for(const [cid,evs] of Object.entries(convs)){
    h+=`<div class="conv"><div class="cid">⤳ ${cid.slice(0,8)}</div>`;
    for(const ev of evs){
      if(ev.event_type==="message"){const en=ev.envelope,b=en.body||{};
        const wave = en.type==="wave" ? (en.solicit?" 〰solicit":" 〰wave") : "";
        h+=`<div class="hop"><span class="rt">hop ${en.hop_count}${wave}</span> <b>${en.from}</b> <span class="arrow">→</span> <b>${en.to}</b> [${b.intent}]<br><span class="rt">${(b.text||"").slice(0,90)}</span></div>`;}
      else if(ev.event_type==="done"&&ev.summary){h+=`<div class="hop sum">✓ ${ev.to}: ${ev.summary.slice(0,90)}</div>`;}
      else if(ev.event_type==="terminated"){h+=`<div class="term">✸ extinguished: ${canon(ev.reason)} → ${ev.to||""}</div>`;}
      else if(ev.event_type==="operator_action"){h+=`<div class="op">⚙ <b>operator</b> ${ev.action}${ev.reason?` (${ev.reason})`:""} <span class="rt">— ${ev.actor||"operator"}</span></div>`;}
    }
    h+=`</div>`;
  }
  el.innerHTML=h||`<div class="empty">waiting for events…</div>`;
}

function renderTelescope(){
  const sel=document.getElementById("convsel"); const cid=sel.value;
  const el=document.getElementById("telescope");
  const ms=events.filter(e=>e.event_type==="progress"&&e.conversation_id===cid);
  let start=0; ms.forEach((e,i)=>{if((e.progress||{}).kind==="turn_start")start=i;});
  const turn=ms.slice(start);
  if(!turn.length){el.innerHTML=`<div class="empty">no live progress for this turn</div>`;return;}
  el.innerHTML=turn.map(e=>{const p=e.progress||{};const done=p.kind==="turn_done";
    return `<div class="mile ${done?'done':''}">• <b>${p.kind}</b> ${p.name||p.subtype||""}</div>`;}).join("");
}

function renderExtinction(){
  const el=document.getElementById("extinction");
  const rows=events.filter(e=>e.event_type==="terminated");
  if(!rows.length){el.innerHTML=`<div class="empty">none yet</div>`;return;}
  el.innerHTML=rows.map(e=>{const r=canon(e.reason);
    return `<div class="ext"><span class="badge r-${r}">${r}</span><span class="rt">${(e.conversation_id||"").slice(0,8)}</span><span>${e.from||""} → ${e.to||""}</span></div>`;}).join("");
}

let raf=null;
function render(){ if(raf)return; raf=requestAnimationFrame(()=>{raf=null;
  document.getElementById("count").textContent=events.length+" events";
  renderSky(); renderTimeline(); renderTelescope(); renderExtinction();});}
document.getElementById("convsel").addEventListener("change",()=>{renderTelescope();renderTimeline();});
render();
</script>
</body>
</html>
