# Aether full local stack: the medium (Redis) + both web interfaces.
#
#   redis      — the "介質" / MQ. AOF-persisted so unACKed Streams entries survive
#                a restart (spec §2.4, scenario 6).
#   stargazer  — READ-ONLY dashboard (§15). Harmless, so it is always on.
#   operator   — PRIVILEGED control plane (§18): inject / pause / resume /
#                terminate / kill. Guarded by localhost + token.
#
# Run everything:   docker compose -f aether/docker-compose.yml up -d
# Secrets live in aether/.env (gitignored): AETHER_OPERATOR_TOKEN (operator),
# AETHER_REDIS_PASSWORD (Redis auth — EMPTY = auth OFF, localhost dev unchanged).
#
# EXPOSURE INVARIANT (§15.6 / §18.3): the web apps + the plain Redis port are
# published on 127.0.0.1 only — reachable from this machine, NOT the LAN. The
# one intentional exception is Redis :6380 (TLS), which is the cross-machine bus
# port and is protected by TLS + password. Do not turn :6379 / :8765 / :8770
# into bare LAN ports.
services:
  redis:
    image: redis:7
    container_name: aether-redis
    env_file:
      - .env                             # AETHER_REDIS_PASSWORD (optional; empty = no auth)
    # AOF persistence (§2.4). requirepass: empty → auth OFF (localhost dev
    # byte-identical); set AETHER_REDIS_PASSWORD in .env to turn auth ON. TLS on
    # :6380 auto-enables when certs are present in ./certs (run
    # scripts/make-certs.sh); absent → plain :6379 only. `set --` preserves the
    # empty-password arg quoting.
    command:
      - sh
      - -c
      - |
        set -- --appendonly yes --requirepass "$$AETHER_REDIS_PASSWORD"
        if [ -f /certs/redis.crt ]; then
          set -- "$$@" --tls-port 6380 --port 6379 \
            --tls-cert-file /certs/redis.crt \
            --tls-key-file /certs/redis.key \
            --tls-ca-cert-file /certs/ca.crt
        fi
        exec redis-server "$$@"
    ports:
      - "127.0.0.1:6379:6379"            # plain: loopback only (localhost dev)
      - "6380:6380"                      # TLS: cross-machine bus (only listens with certs)
    volumes:
      - aether-redis-data:/data
      - ./certs:/certs:ro
    healthcheck:
      # auth-aware: with a password use -a, else plain ping (else NOAUTH → unhealthy).
      test: ["CMD-SHELL", "if [ -n \"$$AETHER_REDIS_PASSWORD\" ]; then redis-cli -a \"$$AETHER_REDIS_PASSWORD\" --no-auth-warning ping; else redis-cli ping; fi | grep -q PONG"]
      interval: 2s
      timeout: 3s
      retries: 10

  stargazer:
    build:
      context: .
    image: aether-web
    container_name: aether-stargazer
    command: ["python", "-m", "aether.stargazer.server"]
    env_file:
      - .env                             # AETHER_REDIS_PASSWORD (to reach an auth'd bus)
    environment:
      AETHER_STARGAZER_HOST: "0.0.0.0"   # bind all interfaces *inside* the container…
      AETHER_REDIS_HOST: "redis"         # …reach Redis by its compose service name (plain, internal)
      AETHER_REDIS_DB: "0"
    ports:
      - "127.0.0.1:8765:8765"            # …but expose to the host on loopback only
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/api/health')"]
      interval: 5s
      timeout: 3s
      retries: 10

  operator:
    build:
      context: .
    image: aether-web
    container_name: aether-operator
    command: ["python", "-m", "aether.operator_panel.server"]
    env_file:
      - .env                             # AETHER_OPERATOR_TOKEN + AETHER_REDIS_PASSWORD
    environment:
      AETHER_OPERATOR_HOST: "0.0.0.0"
      AETHER_REDIS_HOST: "redis"
      AETHER_REDIS_DB: "0"
    ports:
      - "127.0.0.1:8770:8770"            # privileged path: loopback-only + token
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8770/health')"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  aether-redis-data:
